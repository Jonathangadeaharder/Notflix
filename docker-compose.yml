# =============================================================================
#  Notflix — Local Development Stack
#  Usage:  docker compose up --build          (or ./start.sh / start.bat)
# =============================================================================

services:
  # ── Postgres (Supabase-flavoured) ──────────────────────
  db:
    image: supabase/postgres:15.8.1.060
    container_name: notflix-db
    ports: ["5432:5432"]
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB:       postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── GoTrue (Auth) ─────────────────────────────────────
  auth:
    image: supabase/gotrue:v2.170.0
    container_name: notflix-auth
    depends_on:
      db: { condition: service_healthy }
    environment:
      GOTRUE_API_HOST:          "0.0.0.0"
      GOTRUE_API_PORT:          "9999"
      API_EXTERNAL_URL:         ${API_EXTERNAL_URL:-http://localhost:8000}
      GOTRUE_DB_DRIVER:         postgres
      GOTRUE_DB_DATABASE_URL:   postgres://postgres:${POSTGRES_PASSWORD:-password}@db:5432/postgres?search_path=auth
      GOTRUE_SITE_URL:          ${SITE_URL:-http://localhost:5173}
      GOTRUE_URI_ALLOW_LIST:    "*"
      GOTRUE_DISABLE_SIGNUP:    "false"
      GOTRUE_JWT_ADMIN_ROLES:   service_role
      GOTRUE_JWT_AUD:           authenticated
      GOTRUE_JWT_DEFAULT_EXP:   3600
      GOTRUE_JWT_SECRET:        ${JWT_SECRET:-your-super-secret-jwt-token-with-at-least-32-characters}
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SMTP_ADMIN_EMAIL:  admin@example.com
      GOTRUE_SMTP_HOST:         inbucket
      GOTRUE_SMTP_PORT:         "2500"
      GOTRUE_LOG_LEVEL:         DEBUG
      GOTRUE_OPERATOR_TOKEN:    ${OPERATOR_TOKEN:-super-secret-operator-token}

  # ── Kong (API Gateway) ────────────────────────────────
  kong:
    image: kong:2.8.1
    container_name: notflix-kong
    depends_on: [auth]
    ports:
      - "8000:8000"
      - "8443:8443"
    environment:
      KONG_DATABASE:           "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER:          LAST,A,CNAME
      KONG_PLUGINS:            request-transformer,cors,key-auth,acl
      KONG_LOG_LEVEL:          warn
    volumes:
      - ./volumes/api:/var/lib/kong:ro

  # ── Platform (SvelteKit) ──────────────────────────────
  platform:
    image: notflix_platform
    container_name: notflix-platform
    build:
      context: .
      dockerfile: apps/platform/Dockerfile
    ports: ["5173:5173"]
    volumes:
      # Source mounts (hot-reload)
      - ./apps/platform:/app/apps/platform
      - ./packages/database:/app/packages/database
      - ./media:/app/media
      - ./logs:/app/logs
      # Anonymous volumes: protect container-native node_modules
      - /app/node_modules
      - /app/apps/platform/node_modules
      - /app/packages/database/node_modules
    environment:
      DATABASE_URL:            postgres://postgres:${POSTGRES_PASSWORD:-your-super-secret-db-password}@db:5432/postgres
      AI_SERVICE_URL:          http://ai-service:8000
      AI_SERVICE_API_KEY:      dev_secret_key
      UPLOAD_DIR:              /app/media/uploads
      SUPABASE_URL:            http://kong:8000
      PUBLIC_SUPABASE_URL:     http://localhost:8000
      PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRFA0NiK7kyqd6RoFh2jJIpMKpGVhAzCJtJFvFo4uQs}
      RUNNING_IN_DOCKER:       "true"
    depends_on:
      db:         { condition: service_healthy }
      kong:       { condition: service_started }
      ai-service: { condition: service_started }

  # ── AI Service (FastAPI) ──────────────────────────────
  ai-service:
    image: notflix_ai-service
    container_name: notflix-ai
    build:
      context: .
      dockerfile: apps/ai-service/Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports: ["8001:8000"]
    volumes:
      - ./apps/ai-service:/app
      - ./media:/app/media
      - ./logs:/app/logs
    environment:
      PYTHONUNBUFFERED:   "1"
      LOGS_DIR:           /app/logs
      AI_SERVICE_API_KEY: dev_secret_key
    depends_on:
      db: { condition: service_healthy }

volumes:
  pg_data:
