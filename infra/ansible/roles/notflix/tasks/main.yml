---
- name: Install Docker dependencies
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Add Docker GPG key
  shell: |
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Add Docker apt repository
  shell: |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
  args:
    creates: /etc/apt/sources.list.d/docker.list

- name: Install Docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Ensure Docker service is running
  systemd:
    name: docker
    state: started
    enabled: true

- name: Create notflix system user
  user:
    name: notflix
    system: true
    groups: docker
    append: true
    shell: /usr/sbin/nologin

- name: Create /opt/notflix directory structure
  file:
    path: "{{ item }}"
    state: directory
    owner: notflix
    group: docker
    mode: "0750"
  loop:
    - /opt/notflix
    - /opt/notflix/volumes
    - /opt/notflix/volumes/api

- name: Deploy .env file
  copy:
    content: "{{ lookup('env', 'PROD_ENV_FILE') }}"
    dest: /opt/notflix/.env
    owner: notflix
    group: docker
    mode: "0600"
  no_log: true

- name: Deploy docker-compose.prod.yml
  template:
    src: docker-compose.prod.yml.j2
    dest: /opt/notflix/docker-compose.prod.yml
    owner: notflix
    group: docker
    mode: "0640"

- name: Log into GitHub Container Registry
  shell: |
    echo "{{ lookup('env', 'GHCR_TOKEN') }}" | docker login ghcr.io -u "{{ lookup('env', 'GHCR_USER') }}" --password-stdin
  no_log: true

- name: Pull latest images
  shell: |
    cd /opt/notflix
    docker compose -f docker-compose.prod.yml pull
  environment:
    ENV_FILE: /opt/notflix/.env

- name: Deploy with docker compose
  shell: |
    cd /opt/notflix
    docker compose -f docker-compose.prod.yml up -d --remove-orphans
  environment:
    ENV_FILE: /opt/notflix/.env

- name: Smoke test - wait for platform to be healthy
  uri:
    url: http://localhost:3000
    status_code: 200
    timeout: 30
  register: health_check
  retries: 10
  delay: 10
  until: health_check.status == 200
