_format_version: "3.0"

services:
  - name: auth-v1
    _comment: "GoTrue: /auth/v1/* -> http://auth:9999/*"
    url: http://auth:9999/
    routes:
      - name: auth-v1-all
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Accept-Version
            - Content-Length
            - Content-MD5
            - Content-Type
            - Date
            - apikey
            - Authorization
            - x-supabase-api-version
            - x-client-info
          credentials: true
          max_age: 3600

  - name: ai-service
    _comment: "FastAPI AI microservice mapping"
    url: http://ai-service:8000/
    routes:
      - name: ai-service-all
        strip_path: false
        paths:
          - /transcribe
          - /translate
          - /filter
          - /generate_thumbnail
          - /health
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - OPTIONS
          headers:
            - Accept
            - Accept-Version
            - Content-Length
            - Content-MD5
            - Content-Type
            - Date
            - x-api-key
          credentials: true
          max_age: 3600
