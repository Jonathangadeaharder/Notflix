name: Deploy to Production

on:
  push:
    branches:
      - master

# Only one deploy at a time – never cancel a running deploy
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  GITHUB_REPOSITORY: ${{ github.repository }}

jobs:
  # ── 1. Build & Push Docker Images to GHCR ─────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.tag.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tag (short SHA)
        id: tag
        run: echo "version=$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build & push platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/platform/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/notflix-platform:${{ steps.tag.outputs.version }}
            ghcr.io/${{ github.repository }}/notflix-platform:latest
          cache-from: type=gha,scope=platform
          cache-to: type=gha,mode=max,scope=platform

      - name: Build & push ai-service image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/ai-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/notflix-ai-service:${{ steps.tag.outputs.version }}
            ghcr.io/${{ github.repository }}/notflix-ai-service:latest
          cache-from: type=gha,scope=ai-service
          cache-to: type=gha,mode=max,scope=ai-service

  # ── 2. Terraform: Provision / Update Infrastructure ────────────────────────
  terraform:
    name: Terraform (Infra)
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read

    defaults:
      run:
        working-directory: infra/terraform

    outputs:
      droplet_ip: ${{ steps.apply.outputs.droplet_ip }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
          terraform_wrapper: false

      - name: Terraform Init
        env:
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          TF_VAR_ssh_public_key: ${{ secrets.DO_SSH_PUBLIC_KEY }}
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        env:
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          TF_VAR_ssh_public_key: ${{ secrets.DO_SSH_PUBLIC_KEY }}
        run: terraform plan -out=tfplan -input=false

      - name: Terraform Apply
        id: apply
        env:
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          TF_VAR_ssh_public_key: ${{ secrets.DO_SSH_PUBLIC_KEY }}
        run: |
          terraform apply -input=false tfplan
          DROPLET_IP=$(terraform output -raw droplet_ip)
          echo "droplet_ip=${DROPLET_IP}" >> "$GITHUB_OUTPUT"

  # ── 3. Ansible: Configure Server + Deploy Containers ──────────────────────
  ansible:
    name: Ansible (Deploy)
    runs-on: ubuntu-latest
    needs: [build-and-push, terraform]
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          pip install --upgrade pip
          pip install ansible

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Wait for SSH to be available
        run: |
          echo "Waiting for SSH on ${{ needs.terraform.outputs.droplet_ip }}..."
          for i in $(seq 1 30); do
            if ssh -i ~/.ssh/deploy_key \
                   -o StrictHostKeyChecking=no \
                   -o ConnectTimeout=5 \
                   root@${{ needs.terraform.outputs.droplet_ip }} \
                   "echo ok" 2>/dev/null; then
              echo "SSH ready"
              break
            fi
            echo "Attempt $i/30 – waiting 10s..."
            sleep 10
          done

      - name: Write dynamic inventory
        run: |
          cat > infra/ansible/inventory.ini <<EOF
          [notflix]
          ${{ needs.terraform.outputs.droplet_ip }} ansible_user=root ansible_ssh_private_key_file=~/.ssh/deploy_key ansible_ssh_common_args='-o StrictHostKeyChecking=no'
          EOF

      - name: Run Ansible playbook
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          cd infra/ansible
          ansible-playbook site.yml \
            --private-key ~/.ssh/deploy_key \
            -e "image_tag=${IMAGE_TAG}" \
            -e "github_repository=${GITHUB_REPOSITORY}"

      - name: Smoke test
        run: |
          IP="${{ needs.terraform.outputs.droplet_ip }}"
          echo "Smoke testing http://${IP}:3000 ..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "http://${IP}:3000" || echo "000")
            if [[ "$STATUS" =~ ^(200|301|302)$ ]]; then
              echo "✅ Platform is up (HTTP ${STATUS})"
              exit 0
            fi
            echo "Attempt $i/12 – HTTP ${STATUS}, retrying in 15s..."
            sleep 15
          done
          echo "❌ Smoke test failed after 3 minutes"
          exit 1
