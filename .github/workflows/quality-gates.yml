name: Quality Gates

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

concurrency:
  group: quality-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  platform-quality:
    name: Platform Quality
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password
          POSTGRES_DB: main_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d main_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://admin:password@127.0.0.1:5432/main_db
      INTEGRATION_DATABASE_URL: postgres://admin:password@127.0.0.1:5432/main_db
      RUNNING_IN_DOCKER: "false"
      AI_SERVICE_URL: http://127.0.0.1:8000
      AI_SERVICE_API_KEY: dev_secret_key
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Sync node_modules
        run: pnpm install --no-frozen-lockfile

      - name: Sync SvelteKit
        run: pnpm --filter @notflix/platform prepare

      - name: Apply database schema
        run: pnpm --filter @notflix/database db:push

      - name: Type check platform
        run: pnpm --filter @notflix/platform check

      - name: Lint platform
        run: pnpm --filter @notflix/platform lint

      - name: Run platform unit tests
        run: pnpm --filter @notflix/platform test:unit

      - name: Run platform integration tests
        run: pnpm --filter @notflix/platform test:integration

  platform-e2e:
    name: Platform E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password
          POSTGRES_DB: main_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d main_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://admin:password@127.0.0.1:5432/main_db
      INTEGRATION_DATABASE_URL: postgres://admin:password@127.0.0.1:5432/main_db
      RUNNING_IN_DOCKER: "false"
      AI_SERVICE_URL: http://127.0.0.1:8000
      AI_SERVICE_API_KEY: dev_secret_key
      PLAYWRIGHT_TEST: "true"
      MEDIA_ROOT_INTERNAL: ${{ github.workspace }}/media/uploads
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync node_modules
        run: pnpm install --no-frozen-lockfile

      - name: Sync SvelteKit
        run: pnpm --filter @notflix/platform prepare

      - name: Install uv
        run: pip install uv

      - name: Install Playwright browsers
        working-directory: apps/platform
        run: pnpm exec playwright install --with-deps chromium

      - name: Install AI Service dependencies (CPU-only)
        working-directory: apps/ai-service
        run: |
          uv pip install --system torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          uv pip install --system -r requirements.txt

      - name: Apply database schema
        run: pnpm --filter @notflix/database db:push

      - name: Start AI Service
        working-directory: apps/ai-service
        env:
          AI_SERVICE_API_KEY: dev_secret_key
          MEDIA_ROOT: ${{ github.workspace }}/media
          AUDIO_BASE_DIR: ${{ github.workspace }}/media
        run: |
          nohup python -m uvicorn main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 30); do curl -sf -H "X-API-Key: dev_secret_key" http://127.0.0.1:8000/health && break || sleep 2; done

      - name: Run platform E2E tests
        run: pnpm --filter @notflix/platform test:e2e

  ai-service-quality:
    name: AI Service Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Ruff
        working-directory: apps/ai-service
        run: uvx --from ruff ruff check .

      - name: Pylint
        working-directory: apps/ai-service
        run: uvx --with-requirements requirements.lock --from pylint pylint core main.py

      - name: Bandit
        working-directory: apps/ai-service
        run: uvx --with-requirements requirements.lock --from bandit bandit -r core main.py

      - name: Pytest (with coverage gate)
        working-directory: apps/ai-service
        run: uvx --with-requirements requirements.lock --from pytest pytest

  database-quality:
    name: Database Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Sync node_modules
        run: pnpm install --no-frozen-lockfile

      - name: Lint database package
        run: pnpm --filter @notflix/database lint

  required-checks:
    name: Required Checks
    runs-on: ubuntu-latest
    needs:
      - platform-quality
      - platform-e2e
      - ai-service-quality
      - database-quality
    if: always()
    steps:
      - name: Verify all quality jobs passed
        run: |
          if [ "${{ needs.platform-quality.result }}" != "success" ] || \
             [ "${{ needs.platform-e2e.result }}" != "success" ] || \
             [ "${{ needs.ai-service-quality.result }}" != "success" ] || \
             [ "${{ needs.database-quality.result }}" != "success" ]; then
            echo "One or more required quality jobs failed."
            echo "platform-quality: ${{ needs.platform-quality.result }}"
            echo "platform-e2e: ${{ needs.platform-e2e.result }}"
            echo "ai-service-quality: ${{ needs.ai-service-quality.result }}"
            echo "database-quality: ${{ needs.database-quality.result }}"
            exit 1
          fi
          echo "All required quality jobs passed."
